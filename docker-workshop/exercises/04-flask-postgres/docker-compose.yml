version: '3.8'

services:
  # Service Web (API Flask)
  web:
    build: .
    container_name: todo-api
    ports:
      - "8080:5000"
    environment:
      - ENV=development
      - DEBUG=true
      - DB_HOST=db
      - DB_NAME=todoapp
      - DB_USER=postgres
      - DB_PASSWORD=secretpassword
      - DB_PORT=5432
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      # Volume pour les logs (optionnel)
      - ./logs:/app/logs
    networks:
      - todo-network

  # Service Base de données (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: todo-postgres
    environment:
      - POSTGRES_DB=todoapp
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=secretpassword
    ports:
      - "5432:5432"  # Exposé pour debug/admin tools
    volumes:
      # Volume persistant pour les données
      - postgres_data:/var/lib/postgresql/data
      # Script d'initialisation (optionnel)
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d todoapp"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - todo-network

  # Service Admin PostgreSQL (optionnel)
  adminer:
    image: adminer:4.8.1
    container_name: todo-adminer
    ports:
      - "8081:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=db
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - todo-network

# Réseaux
networks:
  todo-network:
    driver: bridge
    name: todo-network

# Volumes persistants
volumes:
  postgres_data:
    name: todo-postgres-data